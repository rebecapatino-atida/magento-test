<!--
    Button component - Atida Hyva Theme
  Source: web/tailwind/components/2-mw-elements/button.css
    CSS classes: .btn, .btn-primary, .btn-secondary, .btn-accent
  -->

  <!-- Primary Button (default CTA) -->
  <button class="btn btn-primary">
    Button text
</button>

  <!-- Primary Button with icon -->
  <button class="btn btn-primary">
    <svg class="inline-flex w-5 h-5 mr-2" aria-hidden="true"></svg>
    Button text
</button>

  <!-- Secondary Button (outlined) -->
  <button class="btn btn-secondary">
    Button text
</button>

  <!-- Accent Button -->
  <button class="btn btn-accent">
    Button text
</button>

  <!-- Disabled Button -->
  <button class="btn btn-primary disabled" disabled>
    Button text
</button>

  <!--
    Base class: .btn
  Variants: btn-primary (bg-optimo), btn-secondary (transparent, border-black), btn-accent (bg-black-20)
    Disabled state: .disabled or [disabled] attribute
-->
